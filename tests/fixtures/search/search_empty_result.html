<!DOCTYPE html>
<html lang='zh-cn'>
<head>
  <meta charset='utf-8'>
  <title>享脉企业版-Bug - 禅道</title>
</head>
<body>
<main id='main'>
  <div class='container'>
<div id="mainContent" class="main-row fade">
  <div class="main-col">
    <form class='main-table table-bug' method='post' id='bugForm'>
      <table class='table has-sort-head datatable' id='bugList'>
        <thead>
          <tr>
          <th class='c-id'>ID</th>
          <th class='c-severity'>级别</th>
          <th class='c-pri'>P</th>
          <th class='c-confirmed'>确认</th>
          <th class='c-title'>Bug标题</th>
          <th class='c-status'>状态</th>
          <th class='c-openedBy'>创建者</th>
          <th class='c-openedDate'>创建日期</th>
          <th class='c-assignedTo'>指派给</th>
          <th class='c-resolution'>方案</th>
          <th class='c-deadline'>截止日期</th>
          <th class='c-actions text-center'>操作</th>
          </tr>
        </thead>
        <tbody>
        </tbody>
      </table>
      <div class='table-footer'>
        <div class="table-statistic">本页共 <strong>0</strong> 个Bug，未解决 <strong>0</strong>。</div>
      </div>
    </form>
  </div>
</div>
</div>
</main>
</body>
</html>
